<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather_Forecast</title>
    <link rel="stylesheet" href="opens.css">
</head>
<body>
    <h1>Weather Forecast</h1>
    <form action="#" method="post">
        <label for="name">Enter your name:</label><br>
        <input type="text" id="name" name="name" required placeholder="enter your name"><br>
        <label for="email">Enter your email:</label><br>
        <input type="email" id="email" name="email" required placeholder="enter your email"><br>

        <label for="city">Enter city:</label><br>
        <input type="text" id="city" name="city" required placeholder="enter city name"><br><br>
        <button type="submit">Search</button>
    </form>
</body>
</html>
